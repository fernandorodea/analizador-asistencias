<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    
    <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
        <h4 class="text-center mb-4 text-danger">Restablecer Contraseña</h4>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert alert-warning text-center">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Tu nombre de usuario</label>
                <input type="text" name="username" class="form-control" required>
                <small class="text-muted">Escribe tu usuario para poder cambiar tu contraseña.</small>
            </div>
            <div class="mb-4">
                <label class="form-label">Tu Nueva Contraseña</label>
                <input type="password" name="new_password" id="password" class="form-control" required>
                <div class="form-check mt-2">
                    <input class="form-check-input" type="checkbox" id="showPassword" onclick="togglePassword()">
                    <label class="form-check-label text-muted small" for="showPassword">Mostrar contraseña</label>
                </div>
            </div>
            
            <button type="submit" class="btn btn-danger w-100 mb-3">Actualizar Contraseña</button>
        </form>

        <div class="text-center mt-2 border-top pt-3">
            <a href="{{ url_for('login') }}" class="text-decoration-none small">Cancelar y volver al inicio</a>
        </div>
    </div>

    <script>
        function togglePassword() {
            var input = document.getElementById("password");
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }
    </script>
</body>
</html>

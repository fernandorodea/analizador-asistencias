<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calificar Exámenes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --color-vino: #84142D; --color-dorado: #C4A77D; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; background-image: url("{{ url_for('static', filename='fondo.png') }}"); background-repeat: repeat; }
        .container-box { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 40px; }
    </style>
</head>
<body>
    <div class="container-box mt-5">
        <a href="{{ url_for('dashboard') }}" class="text-secondary fw-bold text-decoration-none">⬅ Volver al Dashboard</a>
        <h2 class="mt-3" style="color: var(--color-vino);">Calificación de Exámenes</h2>
        <form method="POST" enctype="multipart/form-data" class="mt-4">
            <input type="file" name="file_examenes" class="form-control" accept=".xlsx, .xls" multiple required>
            <button type="submit" class="btn text-white w-100 mt-3" style="background-color: var(--color-vino); font-weight: bold;">Cruzar Calificaciones</button>
        </form>

        {% if candidatos and candidatos|length > 0 %}
        <div class="mt-4">
            <h4>Prestadores Aptos:</h4>
            {% for nombre in candidatos %}
            <div class="p-3 border-bottom">{{ nombre }}</div>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</body>
</html>

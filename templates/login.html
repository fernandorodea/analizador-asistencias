<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Portal de Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --color-vino: #84142D;
            --color-dorado: #C4A77D;
        }
        body { 
            background-color: #f4f4f9; 
            background-image: url("{{ url_for('static', filename='fondo.png') }}");
            background-repeat: repeat;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .login-wrapper { width: 100%; max-width: 450px; padding: 20px; }
        .login-container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid var(--color-vino); }
        .btn-vino { background-color: var(--color-vino); color: white; width: 100%; font-weight: bold; }
        .btn-vino:hover { background-color: #5c0f29; color: white; }
        h3 { color: var(--color-vino); text-align: center; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- LOGOS INSTITUCIONALES -->
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='logos.png') }}" alt="Logos Oficiales" style="max-height: 80px; width: auto; max-width: 100%;">
        </div>

        <div class="login-container">
            <h3>Iniciar Sesión</h3>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert alert-warning text-center">{{ messages[0] }}</div>
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Usuario</label>
                    <input type="text" name="username" class="form-control" placeholder="Escribe tu usuario" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">Contraseña</label>
                    <input type="password" name="password" class="form-control" placeholder="Escribe tu contraseña" required>
                </div>
                <button type="submit" class="btn btn-vino py-2">Ingresar al Sistema</button>
            </form>
            
            <div class="text-center mt-4" style="font-size: 14px;">
                <a href="{{ url_for('registro') }}" style="color: var(--color-vino); text-decoration: none; font-weight: bold;">Crear una cuenta</a> <span class="mx-2 text-muted">|</span> 
                <a href="{{ url_for('recuperar') }}" style="color: var(--color-vino); text-decoration: none; font-weight: bold;">Recuperar contraseña</a>
            </div>
        </div>
    </div>
</body>
</html>

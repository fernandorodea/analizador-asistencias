<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso al Sistema - Cultura y Turismo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --color-vino: #84142D; /* Color guinda/vino oficial */
            --color-dorado: #C4A77D; /* Color dorado/arena oficial */
            --color-fondo: #FDFDFD;
        }
        
        body {
            background-color: var(--color-fondo);
            background-image: url("{{ url_for('static', filename='fondo.png') }}");
            background-repeat: repeat;
        }
        
        /* Botones personalizados */
        .btn-institucional {
            background-color: var(--color-vino);
            color: white;
            border: none;
            font-weight: 500;
        }
        .btn-institucional:hover {
            background-color: #6a0f24;
            color: white;
        }
        
        /* Detalles visuales */
        .text-vino {
            color: var(--color-vino) !important;
        }
        .borde-dorado {
            border-top: 5px solid var(--color-dorado) !important;
        }
        
        /* Contenedor de logos */
        .header-logos {
            max-width: 500px;
            margin: 0 auto 30px auto;
            text-align: center;
            background-color: white;
            padding: 15px;
            border-radius: 8px;
        }
        .header-logos img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body class="d-flex flex-column align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="header-logos shadow-sm borde-dorado w-100 px-3">
        <img src="{{ url_for('static', filename='logos.png') }}" alt="Secretaría de Cultura y Turismo">
    </div>
    
    <div class="card shadow-lg p-4 border-0 borde-dorado" style="width: 100%; max-width: 400px; background-color: rgba(255, 255, 255, 0.98);">
        <h4 class="text-center mb-4 text-vino fw-bold">Control de Asistencias</h4>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert alert-warning text-center small shadow-sm">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Usuario</label>
                <input type="text" name="username" class="form-control" placeholder="Ingresa tu usuario" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">Contraseña</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                <div class="form-check mt-2">
                    <input class="form-check-input" type="checkbox" id="showPassword" onclick="togglePassword()">
                    <label class="form-check-label text-muted small" for="showPassword">Mostrar contraseña</label>
                </div>
            </div>
            
            <button type="submit" class="btn btn-institucional w-100 mb-3 shadow-sm py-2">Ingresar al Sistema</button>
        </form>

        <div class="text-center mt-2 border-top pt-3">
            <a href="{{ url_for('recuperar') }}" class="text-decoration-none small text-secondary d-block mb-2">¿Olvidaste tu contraseña?</a>
            <a href="{{ url_for('registro') }}" class="btn btn-outline-secondary btn-sm w-100">Registrar nuevo usuario</a>
        </div>
    </div>

    <script>
        function togglePassword() {
            var input = document.getElementById("password");
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }
    </script>
</body>
</html>
